<!DOCTYPE html>
<html>
<head>
    <title>F1 Spark Simulator - Interlagos</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; cursor: none; }
        
        /* Imagem da Pista (fundo) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Circuit_Interlagos.svg/1024px-Circuit_Interlagos.svg.png') no-repeat center;
            background-size: cover;
            opacity: 0.3; /* Deixa a pista mais apagada pra ver as faíscas */
            filter: grayscale(100%); /* Pista preta e branca pra contrastar */
            z-index: -2;
        }

        #carro-container {
            position: absolute;
            transition: transform 0.1s ease-out; /* Suavização do movimento */
            pointer-events: none;
            z-index: 100;
        }

        /* Usamos uma imagem ao invés de emoji */
        #carro-imagem {
            width: 100px; /* Tamanho do carro na pista */
            height: auto;
            transform-origin: center; /* Gira pelo centro */
        }

        .faisca {
            position: absolute;
            width: 4px; height: 4px;
            background: #ff4500;
            box-shadow: 0 0 10px #ff0000, 0 0 20px #ff8c00;
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
        }

        /* Velocímetro */
        #hud { position: fixed; bottom: 20px; right: 20px; color: #fff; text-align: right; pointer-events: none; z-index: 200; }
        #velocidade { font-size: 40px; font-weight: bold; font-style: italic; }
    </style>
</head>
<body>

    <div id="carro-container">
        <img id="carro-imagem" src="carro.png" alt="carro de f1" style="display: block;">
    </div>

    <div id="hud">
        <div id="velocidade">000</div>
        <div style="font-size: 15px;">KM/H</div>
    </div>

    <script>
        const container = document.getElementById('carro-container');
        const imagem = document.getElementById('carro-imagem');
        const velDisplay = document.getElementById('velocidade');
        let mouseX = 0, mouseY = 0, carroX = 0, carroY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function engine() {
            // Suavização do movimento
            let dx = mouseX - carroX - 50; // Ajusta o centro (metade da largura do carro)
            let dy = mouseY - carroY - 25; // Ajusta o centro
            
            carroX += dx * 0.15;
            carroY += dy * 0.15;

            // Ângulo de rotação (ajustado para apontar para o mouse)
            let angulo = Math.atan2(dy, dx) * 180 / Math.PI;
            
            // O carro.png já está de pé, então precisamos adicionar 90 graus
            // para que ele gire para a direção certa do mouse.
            container.style.transform = `translate(${carroX}px, ${carroY}px) rotate(${angulo + 90}deg)`;

            // Velocidade
            let dist = Math.sqrt(dx*dx + dy*dy);
            let kmh = Math.min(Math.floor(dist * 5), 340);
            velDisplay.innerText = kmh.toString().padStart(3, '0');

            // Gerar faíscas
            if (dist > 15) { criarFaisca(carroX + 50, carroY + 50); }
            requestAnimationFrame(engine);
        }

        function criarFaisca(x, y) {
            const f = document.createElement('div');
            f.className = 'faisca';
            f.style.left = x + 'px';
            f.style.top = y + 'px';
            document.body.appendChild(f);
            const velX = (Math.random() - 0.5) * 10;
            const velY = Math.random() * 15;
            f.animate([
                { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                { transform: `translate(${velX * 10}px, ${velY * 10}px) scale(0)`, opacity: 0 }
            ], { duration: 400, easing: 'ease-out' });
            setTimeout(() => f.remove(), 400);
        }
        engine();
    </script>
</body>
</html>
