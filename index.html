<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>YT Music - F1 Theme</title>
    <style>
        /* 1. ESTILO DO AMBIENTE (O PADDOCK) */
        body { 
            margin: 0; 
            background: #030303; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }

        /* 2. A CAPA DO DISCO (O PNEU) */
        .album-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
        }

        .album-art { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            border: 8px solid #1a1a1a; 
            background: url('carro.png') center/cover; 
            box-shadow: 0 0 40px rgba(225, 6, 0, 0.3);
            animation: rotate 12s linear infinite; 
            animation-play-state: paused; 
        }

        /* Quando a classe 'playing' entra, o disco gira */
        .playing .album-art { animation-play-state: running; }

        @keyframes rotate { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }

        /* 3. INFORMAÇÕES DA MÚSICA */
        .info { text-align: center; margin-top: 40px; }
        .title { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
        .artist { color: #e10600; font-size: 18px; margin-top: 5px; font-weight: bold; }

        /* 4. BARRA DE PROGRESSO (A PISTA) */
        .track-container { width: 85%; max-width: 450px; margin-top: 50px; }
        .track-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; cursor: pointer; }
        .track-fill { height: 100%; background: #e10600; width: 0%; border-radius: 3px; position: relative; }

        /* 5. CONTROLES (O VOLANTE) */
        .controls { margin-top: 40px; }
        .play-btn { 
            width: 80px; height: 80px; border-radius: 50%; 
            background: white; border: none; cursor: pointer; 
            font-size: 32px; transition: 0.2s; 
        }
        .play-btn:hover { transform: scale(1.1); background: #e10600; color: white; }
    </style>
</head>

    </div>

        <div class="title">F1 Official Theme</div>
        <div class="artist">BRIAN TYLER</div>

    <div class="track-container">
