<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>F1 Simulator - Pro Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; cursor: none; font-family: 'Arial', sans-serif; }
        #car { position: absolute; pointer-events: none; z-index: 100; top: 0; left: 0; }
        #car img { width: 100px; height: auto; transform: rotate(90deg); mix-blend-mode: screen; }
        
        /* Ponto de Corrida */
        #ponto { 
            position: absolute; width: 40px; height: 40px; background: radial-gradient(circle, #ffcc00, #ff4500); 
            border-radius: 50%; box-shadow: 0 0 20px #ffcc00; display: none; z-index: 50;
        }

        /* HUD e Menu */
        #hud { position: fixed; bottom: 20px; right: 20px; color: #fff; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; border-left: 5px solid #e10600; }
        #menu { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(20, 20, 20, 0.9); padding: 30px; border-radius: 15px; text-align: center; color: white; z-index: 2000; border: 2px solid #e10600;
        }
        button { background: #e10600; color: white; border: none; padding: 15px 30px; margin: 10px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        button:hover { background: #ff1e14; }
    </style>
</head>
<body>

    <div id="menu">
        <h2>CONFIGURAÇÃO DO BÓLIDO</h2>
        <button onclick="iniciarJogo('pontos')">MODO CORRIDA DE PONTOS</button>
        <button onclick="iniciarJogo('som')">MODO SOM DO MOTOR</button>
    </div>

    <div id="ponto"></div>
    <div id="car"><img src="carro.png"></div>
    
    <div id="hud">
        <div id="status">MODO: ESPERA</div>
        <div id="kmh" style="font-size: 30px; font-weight: bold;">000</div>
        <div id="score" style="color: #ffcc00; display:none;">PONTOS: 0</div>
    </div>

    <script>
        const car = document.getElementById('car');
        const kmhDisp = document.getElementById('kmh');
        const ponto = document.getElementById('ponto');
        const scoreDisp = document.getElementById('score');
        
        let oldX = 0, oldY = 0, pontos = 0, modoAtivo = "";
        let audioCtx, oscillator;

        function iniciarJogo(modo) {
            modoAtivo = modo;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('status').innerText = "MODO: " + modo.toUpperCase();
            
            if (modo === 'pontos') {
                ponto.style.display = 'block';
                scoreDisp.style.display = 'block';
                moverPonto();
            }
            if (modo === 'som') { iniciarAudio(); }
        }

        function moverPonto() {
            ponto.style.left = Math.random() * (window.innerWidth - 50) + 'px';
            ponto.style.top = Math.random() * (window.innerHeight - 50) + 'px';
        }

        function iniciarAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sawtooth'; 
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            gainNode.gain.value = 0.05; 
            oscillator.start();
        }

        document.addEventListener('mousemove', (e) => {
            if (modoAtivo === "") return;

            const mX = e.clientX; const mY = e.clientY;
            const dx = mX - oldX; const dy = mY - oldY;
            
            // Ângulo corrigido para alinhar o bico do carro (usando +90)
            const angle = (Math.atan2(dy, dx) * 180 / Math.PI) + 90;

            car.style.left = (mX - 50) + 'px';
            car.style.top = (mY - 50) + 'px';
            if (Math.abs(dx) > 1) car.style.transform = `rotate(${angle}deg)`;

            const speed = Math.min(Math.floor(Math.sqrt(dx*dx + dy*dy) * 5), 340);
            kmhDisp.innerText = speed.toString().padStart(3, '0');

            // Lógica de Som (Frequência sobe com a velocidade)
            if (oscillator) {
                oscillator.frequency.setTargetAtTime(100 + (speed * 2), audioCtx.currentTime, 0.1);
            }

            // Lógica de Pontos (Colisão)
            if (modoAtivo === 'pontos') {
                const pRect = ponto.getBoundingClientRect();
                if (mX > pRect.left && mX < pRect.right && mY > pRect.top && mY < pRect.bottom) {
                    pontos++;
                    scoreDisp.innerText = "PONTOS: " + pontos;
                    moverPonto();
                }
            }

            oldX = mX; oldY = mY;
        });
    </script>
</body>
</html>
