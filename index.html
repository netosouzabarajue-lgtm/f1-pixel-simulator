<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>F1 Pixel Simulator - Final Setup</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            cursor: none; 
            font-family: 'Arial', sans-serif; 
        }

        #car { 
            position: absolute; 
            pointer-events: none; 
            z-index: 100;
            /* Removemos a transição para eliminar o drift */
        }

        #car img { 
            width: 110px; 
            height: auto; 
            /* Ajuste de 270 graus para o bico do seu carro ficar pra frente */
            transform: rotate(270deg); 
            mix-blend-mode: screen; 
        }

        /* Painel de Telemetria (Velocímetro) */
        #hud { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            color: #fff; 
            background: rgba(0, 0, 0, 0.8); 
            padding: 15px; 
            border-radius: 8px; 
            border-left: 6px solid #e10600; 
            z-index: 1000; 
            text-align: right;
        }

        #kmh { 
            font-size: 45px; 
            font-weight: bold; 
            font-style: italic; 
            line-height: 1;
        }

        .unidade { 
            font-size: 14px; 
            color: #ffcc00; 
            font-weight: bold; 
        }

        .faisca { 
            position: absolute; 
            width: 3px; 
            height: 3px; 
            background: #ffcc00; 
            border-radius: 50%; 
            pointer-events: none; 
            box-shadow: 0 0 5px #ff4500;
        }
    </style>
</head>
<body>

    <div id="car">
        <img src="carro.png" alt="F1 Car">
    </div>

    <div id="hud">
        <div id="kmh">000</div>
        <div class="unidade">KM/H</div>
    </div>
