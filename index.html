<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>F1 Test - Force Update</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #car { position: absolute; z-index: 100; pointer-events: none; }
        #car img { width: 90px; transform: rotate(90deg); mix-blend-mode: screen; }
        #hud { position: fixed; bottom: 20px; right: 20px; color: #fff; background: rgba(0,0,0,0.8); padding: 10px; border-left: 5px solid red; }
    </style>
</head>
<body>
    <div id="car"><img src="carro.png"></div>
    <div id="hud"><div id="kmh" style="font-size: 30px;">000</div>KM/H</div>

    <script>
        const car = document.getElementById('car');
        const kmh = document.getElementById('kmh');
        let cX = 0, cY = 0;

        document.addEventListener('mousemove', (e) => {
            const mX = e.clientX;
            const mY = e.clientY;
            const dx = mX - cX - 45;
            const dy = mY - cY - 45;
            
            // Ângulo + 90 para o bico ficar reto
            const angle = (Math.atan2(dy, dx) * 180 / Math.PI) + 90;

            cX = mX - 45;
            cY = mY - 45;

            car.style.left = cX + 'px';
            car.style.top = cY + 'px';
            car.style.transform = `rotate(${angle}deg)`;

            const speed = Math.floor(Math.sqrt(dx*dx + dy*dy) * 5);
            kmh.innerText = speed.toString().padStart(3, '0');
        });
    </script>
</body>
</html>
