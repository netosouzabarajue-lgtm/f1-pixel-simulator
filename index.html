<!DOCTYPE html>
<html>
<head>
    <title>F1 Simulator - Ajuste de Telemetria</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; cursor: none; background-color: #000; }
        
        #carro-container {
            position: absolute;
            pointer-events: none;
            z-index: 100;
            will-change: transform;
        }

        #carro-imagem {
            width: 120px; 
            height: auto;
            /* Se a imagem estiver com fundo branco, a linha abaixo ajuda a disfarçar no fundo preto */
            mix-blend-mode: screen; 
        }

        .faisca {
            position: absolute;
            width: 3px; height: 3px;
            background: #ffcc00;
            box-shadow: 0 0 8px #ff4500;
            border-radius: 50%;
            pointer-events: none;
        }

        /* Velocímetro - Estilo Red Bull/Racing */
        #hud { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            color: #fff; 
            text-align: right; 
            z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            border-right: 5px solid #ffcc00;
        }
        #velocidade { font-size: 50px; font-weight: bold; font-style: italic; color: #fff; }
        .unidade { font-size: 15px; color: #ffcc00; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="carro-container">
        <img id="carro-imagem" src="carro.png" alt="F1 Car">
    </div>

    <div id="hud">
        <div id="velocidade">000</div>
        <div class="unidade">KM/H</div>
    </div>

    <script>
        const container = document.getElementById('carro-container');
        const velDisplay = document.getElementById('velocidade');
        let mouseX = 0, mouseY = 0, carroX = 0, carroY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function engine() {
            // Aumentamos o fator para 0.40 para o carro "grudar" no mouse e parar o drift
            let dx = mouseX - carroX - 60;
            let dy = mouseY - carroY - 30;
            
            carroX += dx * 0.40; 
            carroY += dy * 0.40;

            let angulo = Math.atan2(dy, dx) * 180 / Math.PI;
            container.style.transform = `translate(${carroX}px, ${carroY}px) rotate(${angulo}deg)`;

            // Cálculo do KM/H baseado no movimento
            let dist = Math.sqrt(dx*dx + dy*dy);
            let kmh = Math.min(Math.floor(dist * 8), 340);
            velDisplay.innerText = kmh.toString().padStart(3, '0');

            if (dist > 5) { criarFaisca(carroX + 60, carroY + 30); }
            requestAnimationFrame(engine);
        }

        function criarFaisca(x, y) {
            const f = document.createElement('div');
            f.className = 'faisca';
            f.style.left = x + 'px';
            f.style.top = y + 'px';
            document.body.appendChild(f);
            
            const vX = (Math.random() - 0.5) * 10;
            const vY = (Math.random() - 0.5) * 10;

            f.animate([
                { transform: 'translate(0,0) scale(1)', opacity: 1 },
                { transform: `translate(${vX*10}px, ${vY*10}px) scale(0)`, opacity: 0 }
            ], { duration: 300 });
            setTimeout(() => f.remove(), 300);
        }
        engine();
    </script>
</body>
</html>
