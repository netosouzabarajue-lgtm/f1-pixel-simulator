<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>F1 Ultimate - Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; cursor: default; font-family: 'Arial', sans-serif; }
        #car { position: absolute; pointer-events: none; z-index: 100; display: none; }
        #car img { width: 90px; height: auto; transform: rotate(90deg); mix-blend-mode: screen; }
        
        #menu { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #111; padding: 40px; border-radius: 15px; text-align: center; 
            color: white; z-index: 2000; border: 2px solid #e10600; 
        }
        button { 
            background: #e10600; color: white; border: none; padding: 15px; 
            margin: 10px; cursor: pointer; font-weight: bold; width: 220px; font-size: 16px;
        }
        #hud { position: fixed; bottom: 20px; right: 20px; color: #fff; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>F1 SIMULATOR</h1>
        <button id="btnSeco">PISTA SECA</button><br>
        <button id="btnChuva">PISTA MOLHADA (DRIFT)</button>
    </div>

    <div id="car"><img src="carro.png"></div>
    
    <div id="hud">
        <div id="kmh" style="font-size: 30px; font-weight: bold;">000 KM/H</div>
        <div id="score">PONTOS: 0</div>
    </div>

    <script>
        const menu = document.getElementById('menu');
        const car = document.getElementById('car');
        const hud = document.getElementById('hud');
        let modo = "";

        // Escutadores de clique diretos (mais seguros que o onclick)
        document.getElementById('btnSeco').addEventListener('click', () => iniciar('seco'));
        document.getElementById('btnChuva').addEventListener('click', () => iniciar('chuva'));

        function iniciar(m) {
            modo = m;
            menu.style.display = 'none';
            car.style.display = 'block';
            hud.style.display = 'block';
            document.body.style.cursor = 'none';
            loop(); // Liga o motor
        }

        let mouseX = 0, mouseY = 0, cX = 0, cY = 0;
        document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });

        function loop() {
            let dx = mouseX - cX - 45;
            let dy = mouseY - cY - 45;
            let suavidade = (modo === 'chuva') ? 0.05 : 0.2;

            cX += dx * suavidade;
            cY += dy * suavidade;

            let angle = (Math.atan2(dy, dx) * 180 / Math.PI) + 90;
            car.style.left = cX + 'px';
            car.style.top = cY + 'px';
            car.style.transform = `rotate(${angle}deg)`;

            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
